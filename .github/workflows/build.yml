name: Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_14.2.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --project .

      - name: Build for iOS
        run: |
          xcodebuild \
            -project CiemaydoBrowser.xcodeproj \
            -scheme CiemaydoBrowser \
            -sdk iphoneos \
            -configuration Release \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -derivedDataPath build

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/CiemaydoBrowser.app Payload/
          zip -r CiemaydoBrowser-unsigned.ipa Payload/
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CiemaydoBrowser-unsigned
          path: CiemaydoBrowser-unsigned.ipa
